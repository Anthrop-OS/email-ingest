name: Python Tests CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Mock Environment Variables
      run: |
        echo "WORK_EMAIL_PASSWORD=dummy_pass" >> $GITHUB_ENV
        echo "LLM_API_KEY=dummy_key" >> $GITHUB_ENV

    - name: Run tests with coverage
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v \
          --cov=core --cov=modules \
          --cov-report=term-missing \
          --cov-report=json:coverage.json \
          --junitxml=test-results.xml

    - name: Upload coverage artifact
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.json

    # Build the coverage markdown once and publish it to two destinations:
    #
    # 1. $GITHUB_STEP_SUMMARY — always; visible in the Actions UI on every
    #    run (push, same-repo PR, fork PR). No special permissions needed.
    # 2. A PR comment — only for pull_request events AND only when the PR
    #    head is in the same repo. For fork PRs the default GITHUB_TOKEN is
    #    forcibly downgraded to read-only regardless of the workflow's
    #    `permissions:` block, so the comment API returns 403. Skipping the
    #    comment step for forks keeps CI green while the step summary still
    #    carries the report.
    - name: Build coverage report
      if: matrix.python-version == '3.12'
      id: coverage
      run: |
        python <<'PY'
        import json
        from datetime import datetime, timezone

        with open("coverage.json") as f:
            d = json.load(f)

        total = d["totals"]["percent_covered_display"]
        stmts = d["totals"]["num_statements"]
        miss = d["totals"]["missing_lines"]

        pct = float(total)
        badge = "\U0001F534"  # red circle
        if pct >= 80:
            badge = "\U0001F7E2"  # green circle
        elif pct >= 60:
            badge = "\U0001F7E1"  # yellow circle

        rows = []
        for path, info in sorted(d["files"].items()):
            rows.append(
                "| `{path}` | {stmts_f} | {miss_f} | {pct_f}% |".format(
                    path=path,
                    stmts_f=info["summary"]["num_statements"],
                    miss_f=info["summary"]["missing_lines"],
                    pct_f=info["summary"]["percent_covered_display"],
                )
            )
        breakdown = "\n".join(rows)
        date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

        # Built line-by-line instead of a multi-line triple-quoted string so
        # every line in this heredoc stays above the YAML block-scalar
        # base indent (the YAML parser rejects un-indented content inside
        # `run: |`).
        lines = [
            "## {} Test Coverage Report".format(badge),
            "",
            "| Metric | Value |",
            "|:---|:---|",
            "| **Total Coverage** | **{}%** |".format(total),
            "| Statements | {} |".format(stmts),
            "| Missed Lines | {} |".format(miss),
            "| Python | 3.12 |",
            "",
            "### Per-File Breakdown",
            "",
            "| File | Stmts | Miss | Cover |",
            "|:---|:---:|:---:|:---:|",
            breakdown,
            "",
            "---",
            "*Generated by CI on {}*".format(date),
            "",
        ]
        body = "\n".join(lines)

        # Write explicitly as UTF-8 so emoji survive regardless of the
        # runner's locale / stdout encoding.
        with open("coverage-report.md", "w", encoding="utf-8") as f:
            f.write(body)
        PY

        # Always publish to the step summary (works on every event, no perms).
        cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post coverage report to PR
      # Only post a PR comment when:
      #   - we're in a pull_request event, AND
      #   - the PR head is in the same repo (not a fork), so the default
      #     GITHUB_TOKEN has not been downgraded to read-only.
      if: |
        matrix.python-version == '3.12'
        && github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('coverage-report.md', 'utf8');

          // Find an existing coverage comment from the bot and update it
          // instead of stacking new comments on every run.
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(c =>
            c.body.includes('Test Coverage Report') && c.user.type === 'Bot'
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
