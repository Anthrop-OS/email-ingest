name: Python Tests CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Mock Environment Variables
      run: |
        echo "WORK_EMAIL_PASSWORD=dummy_pass" >> $GITHUB_ENV
        echo "LLM_API_KEY=dummy_key" >> $GITHUB_ENV

    - name: Run tests with coverage
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v \
          --cov=core --cov=modules \
          --cov-report=term-missing \
          --cov-report=json:coverage.json \
          --junitxml=test-results.xml

    - name: Upload coverage artifact
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.json

    - name: Generate coverage summary
      if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
      id: coverage
      run: |
        TOTAL=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['percent_covered_display'])")
        STMTS=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['num_statements'])")
        MISS=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['missing_lines'])")
        
        # Per-module breakdown
        BREAKDOWN=$(python -c "
        import json
        d = json.load(open('coverage.json'))
        lines = []
        for f, info in sorted(d['files'].items()):
            pct = info['summary']['percent_covered_display']
            stmts = info['summary']['num_statements']
            miss = info['summary']['missing_lines']
            lines.append(f'| \`{f}\` | {stmts} | {miss} | {pct}% |')
        print('\n'.join(lines))
        ")
        
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "stmts=$STMTS" >> $GITHUB_OUTPUT
        echo "miss=$MISS" >> $GITHUB_OUTPUT
        
        # Write breakdown to file for multiline output
        echo "$BREAKDOWN" > breakdown.txt

    - name: Post coverage report to PR
      if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const total = '${{ steps.coverage.outputs.total }}';
          const stmts = '${{ steps.coverage.outputs.stmts }}';
          const miss = '${{ steps.coverage.outputs.miss }}';
          const breakdown = fs.readFileSync('breakdown.txt', 'utf8').trim();
          
          let badge = '🔴';
          if (parseFloat(total) >= 80) badge = '🟢';
          else if (parseFloat(total) >= 60) badge = '🟡';
          
          const body = `## ${badge} Test Coverage Report
          
          | Metric | Value |
          |:---|:---|
          | **Total Coverage** | **${total}%** |
          | Statements | ${stmts} |
          | Missed Lines | ${miss} |
          | Python | 3.12 |
          
          ### Per-File Breakdown
          
          | File | Stmts | Miss | Cover |
          |:---|:---:|:---:|:---:|
          ${breakdown}
          
          ---
          *Generated by CI on ${new Date().toISOString().split('T')[0]}*`;
          
          // Find existing coverage comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(c =>
            c.body.includes('Test Coverage Report') && c.user.type === 'Bot'
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }
